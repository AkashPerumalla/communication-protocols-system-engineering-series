spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}.${PLATFORM_NAMESPACE:day26-platform}.svc.cluster.local:3306/${MYSQL_DATABASE:day26db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:day26}
    password: ${MYSQL_PASSWORD:day26pass}

app:
  cluster:
    name: ${PLATFORM_CLUSTER_NAME:docker-desktop}
    namespace: ${PLATFORM_NAMESPACE:day26-platform}

server:
  port: 8087

spring:
  application:
    name: day21-rest-apis
  datasource:
    url: jdbc:h2:mem:day21db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.sky2dev.day21: INFO
    org.springframework.security: INFO

app:
  security:
    viewer-username: viewer
    viewer-password: viewer123
    operator-username: operator
    operator-password: operator123
    admin-username: admin
    admin-password: admin123

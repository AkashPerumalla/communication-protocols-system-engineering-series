services:
  app:
    build: .
    container_name: day28-mcp-app
    ports:
      - "8093:8093"
    environment:
      APP_PORT: 8093
      DETERMINISTIC_MODE: "true"
      POSTGRES_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8093/health | grep -q 'SYSTEM_HEALTHY'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: day28-mcp-postgres
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: day28_mcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d day28_mcp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

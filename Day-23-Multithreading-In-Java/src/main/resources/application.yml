server:
  port: 8089

spring:
  application:
    name: day23-multithreading-in-java
  datasource:
    url: jdbc:h2:mem:day23;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  scheduling:
    enabled: true

logging:
  level:
    com.sky2dev.day23: INFO

spring:
  application:
    name: day16-telemetry-vs-telecommand
  datasource:
    url: jdbc:h2:mem:day16db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
server:
  port: 8082
logging:
  level:
    root: INFO
    com.sky2dev.day16: INFO
